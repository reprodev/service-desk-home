<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Orientation Slide 2</title>
  <desc id="desc">Priority management slide focused on triage discipline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081a2f"/>
      <stop offset="100%" stop-color="#132642"/>
    </linearGradient>
    <linearGradient id="risk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d79d8"/>
      <stop offset="100%" stop-color="#f08e34"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="70" y="60" width="1460" height="120" rx="18" fill="#0a1f36" stroke="#3a6c9a"/>
  <text x="120" y="110" fill="#dff1ff" font-size="38" font-family="Calibri, Arial" font-weight="700">Orientation 2 // Priority Management</text>
  <text x="120" y="144" fill="#a8caea" font-size="22" font-family="Calibri, Arial">Urgent requests deserve clarity, not panic theater.</text>

  <rect x="130" y="230" width="1340" height="560" rx="20" fill="#0b1b31" stroke="#2f638f"/>
  <rect x="170" y="272" width="1260" height="48" rx="12" fill="#123154"/>
  <rect x="170" y="272" width="870" height="48" rx="12" fill="url(#risk)"/>
  <text x="194" y="304" fill="#091728" font-size="22" font-family="Calibri, Arial" font-weight="700">TRIAGE STABILITY: 69% -> TARGET 88%</text>

  <rect x="170" y="350" width="390" height="400" rx="14" fill="#12375f" stroke="#3f729f"/>
  <text x="200" y="406" fill="#e2f2ff" font-size="28" font-family="Calibri, Arial" font-weight="700">P1 Critical</text>
  <text x="200" y="448" fill="#c6ddf3" font-size="22" font-family="Calibri, Arial">Service outage</text>
  <text x="200" y="482" fill="#c6ddf3" font-size="22" font-family="Calibri, Arial">Security incident</text>
  <text x="200" y="516" fill="#c6ddf3" font-size="22" font-family="Calibri, Arial">Executive-impacting failure</text>

  <rect x="605" y="350" width="390" height="400" rx="14" fill="#12375f" stroke="#3f729f"/>
  <text x="635" y="406" fill="#e2f2ff" font-size="28" font-family="Calibri, Arial" font-weight="700">P2 Significant</text>
  <text x="635" y="448" fill="#c6ddf3" font-size="22" font-family="Calibri, Arial">Team productivity blocked</text>
  <text x="635" y="482" fill="#c6ddf3" font-size="22" font-family="Calibri, Arial">Core workflow degraded</text>
  <text x="635" y="516" fill="#c6ddf3" font-size="22" font-family="Calibri, Arial">Escalate with evidence</text>

  <rect x="1040" y="350" width="390" height="400" rx="14" fill="#2b1319" stroke="#b75f68"/>
  <text x="1070" y="406" fill="#ffd6da" font-size="28" font-family="Calibri, Arial" font-weight="700">Synergy-AI Review</text>
  <text x="1070" y="448" fill="#ffe7e9" font-size="20" font-family="Calibri, Arial">Panic responses are deprecated.</text>
  <text x="1070" y="480" fill="#ffe7e9" font-size="20" font-family="Calibri, Arial">Classification consistency</text>
  <text x="1070" y="510" fill="#ffe7e9" font-size="20" font-family="Calibri, Arial">is rewarded.</text>
  <text x="1070" y="542" fill="#ffe7e9" font-size="20" font-family="Calibri, Arial">Human efficiency remains</text>
  <text x="1070" y="572" fill="#ffe7e9" font-size="20" font-family="Calibri, Arial">under active monitoring.</text>
</svg>
